name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Smart Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Clarinet
        uses: hirosystems/clarinet-action@v1

      - run: clarinet check

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm test
      - run: npm run build
        env:
          NEXT_PUBLIC_CONTRACT_DEPLOYER: ST1XHPEWSZYNN2QA9QG9JG9GHRVF6GZSFRWTFB5VV
          NEXT_PUBLIC_NETWORK: testnet
          NEXT_PUBLIC_STACKS_API_URL: https://api.testnet.hiro.so
          NEXT_PUBLIC_SBTC_CONTRACT: ST1F7QA2MDF17S807EPA36TSS8AMEFY4KA9TVGWXT.sbtc-token
          NEXT_PUBLIC_PYTH_ENDPOINT: https://hermes.pyth.network
